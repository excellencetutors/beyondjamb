<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BEYOND JAMB WEBINAR | EXCELLENCE TUTORS COLLEGE</title>
    <meta name="description" content="Bridge the gap between your JAMB score and university admission. Secure your seat today!">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://excellencetutors.github.io/beyondjamb/">
    <meta property="og:title" content="BEYOND JAMB WEBINAR | EXCELLENCE TUTORS COLLEGE">
    <meta property="og:description" content="Bridge the gap between your JAMB score and university admission.">
    <meta property="og:image" content="https://i.ibb.co/xSCgY7Dw/Adobe-Express-file.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:image" content="https://i.ibb.co/xSCgY7Dw/Adobe-Express-file.png">

    <style>
        :root {
            --primary-bg: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --text-main: #ffffff;
            --text-muted: #e0e0e0;
            --gold-accent: #f1c40f;
            --glow: 0 0 15px rgba(241, 196, 15, 0.5);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: linear-gradient(rgba(10, 10, 12, 0.85), rgba(10, 10, 12, 0.6)), 
                              url('https://i.ibb.co/QjNL8vM1/1777014430079-3.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .form-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            margin: 20px 0;
        }

        header { text-align: center; margin-bottom: 30px; }
        .logo-container { width: 130px; margin: 0 auto 15px auto; }
        .college-logo-transparent { width: 100%; filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.6)); }
        .college-name { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; display: block; margin-bottom: 8px; text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        
        h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; background: linear-gradient(135deg, #ffffff 0%, #f1c40f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .tagline { font-size: 1rem; color: var(--text-muted); margin-bottom: 20px; letter-spacing: 1px; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 0.7rem; color: var(--gold-accent); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.9rem; }
        input:focus, textarea:focus { outline: none; border-color: var(--gold-accent); box-shadow: var(--glow); }

        .submit-btn { width: 100%; padding: 16px; background: var(--gold-accent); color: #000; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { background: #f39c12; transform: translateY(-2px); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--gold-accent); max-width: 90%; }
        .whatsapp-btn { display: inline-block; padding: 16px 30px; background: #25D366; color: white; text-decoration: none; border-radius: 50px; font-weight: 700; margin-top: 20px; }

        @media (max-width: 768px) { .input-row { grid-template-columns: 1fr; gap: 0; } h1 { font-size: 2rem; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-wrapper">
        <header>
            <div class="logo-container">
                <img src="https://i.ibb.co/xSCgY7Dw/Adobe-Express-file.png" alt="Logo" class="college-logo-transparent">
            </div>
            <span class="college-name">Excellence Tutors College</span>
            <h1>BEYOND JAMB</h1>
            <p class="tagline">Registration Form</p>
        </header>

        <form id="webinarForm">
            <div class="input-row">
                <div class="form-group"><label>Full Name</label><input type="text" required placeholder="Full Name"></div>
                <div class="form-group"><label>WhatsApp Number</label><input type="tel" required placeholder="e.g. 08012345678"></div>
            </div>

            <div class="input-row">
                <div class="form-group"><label>Email Address</label><input type="email" required placeholder="name@example.com"></div>
                <div class="form-group"><label>UTME Score</label><input type="number" required placeholder="e.g. 280"></div>
            </div>

            <div class="input-row">
                <div class="form-group"><label>Course of Choice</label><input type="text" required placeholder="e.g. Medicine"></div>
                <div class="form-group"><label>School of Choice</label><input type="text" required placeholder="e.g. UNILAG"></div>
            </div>

            <div class="form-group">
                <label>UTME Subject Combination</label>
                <input type="text" required placeholder="e.g. English, Bio, Chem, Physics">
            </div>

            <div class="form-group">
                <label>Why did you choose this Course?</label>
                <input type="text" required placeholder="Tell us your motivation">
            </div>

            <div class="form-group">
                <label>If not your chosen course, then which one?</label>
                <input type="text" placeholder="Alternative course (optional)">
            </div>

            <div class="form-group">
                <label>Any Questions Bothering You on Admission?</label>
                <textarea rows="2" placeholder="List your concerns here..."></textarea>
            </div>

            <div class="form-group">
                <label>What are your expectations from this Session?</label>
                <textarea rows="2" required placeholder="What do you hope to learn?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Secure My Seat Now</button>
        </form>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3 style="color: var(--gold-accent); font-size: 1.8rem;">Success!</h3>
            <p style="color: white; margin: 15px 0;">Your details have been received.</p>
            <p style="color: #ccc; font-size: 0.9rem;">Join the group for the webinar link.</p>
            <a href="https://chat.whatsapp.com/C7Kt7Mf5Cs383C8imodLat" class="whatsapp-btn">Join WhatsApp Group</a>
        </div>
    </div>

    <script>
        document.getElementById('webinarForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('modalOverlay').classList.add('active');
        });
    </script>
</body>
    </html>
