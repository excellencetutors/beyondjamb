<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BEYOND JAMB WEBINAR | EXCELLENCE TUTORS COLLEGE</title>
    <meta name="description" content="Bridge the gap between your JAMB score and university admission. Secure your seat today!">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://excellencetutors.github.io/beyondjamb/">
    <meta property="og:title" content="BEYOND JAMB WEBINAR | EXCELLENCE TUTORS COLLEGE">
    <meta property="og:description" content="Bridge the gap between your JAMB score and university admission. Secure your seat today!">
    <meta property="og:image" content="https://i.ibb.co/xSCgY7Dw/Adobe-Express-file.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://excellencetutors.github.io/beyondjamb/">
    <meta property="twitter:title" content="BEYOND JAMB WEBINAR | EXCELLENCE TUTORS COLLEGE">
    <meta property="twitter:description" content="Bridge the gap between your JAMB score and university admission. Secure your seat today!">
    <meta property="twitter:image" content="https://i.ibb.co/xSCgY7Dw/Adobe-Express-file.png">

    <style>
        :root {
            --primary-bg: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --text-main: #ffffff;
            --text-muted: #e0e0e0;
            --gold-accent: #f1c40f;
            --gold-hover: #f39c12;
            --glow: 0 0 15px rgba(241, 196, 15, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: linear-gradient(rgba(10, 10, 12, 0.85), rgba(10, 10, 12, 0.6)), 
                              url('https://i.ibb.co/QjNL8vM1/1777014430079-3.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .form-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            width: 100%;
            max-width: 700px;
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }

        header { text-align: center; margin-bottom: 40px; }

        .logo-container {
            width: 160px;
            margin: 0 auto 15px auto;
        }

        /* --- BLENDED & GLOWING LOGO --- */
        .college-logo-transparent {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.6));
        }

        /* --- BOLDER COLLEGE NAME --- */
        .college-name {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-main);
            font-weight: 900; 
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        @keyframes professionalBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
        .presents {
            display: block;
            font-size: 0.9rem;
            color: var(--gold-accent);
            font-style: italic;
            letter-spacing: 2px;
            margin-bottom: 15px;
            animation: professionalBlink 2.5s infinite;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #f1c40f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline { font-size: 1.1rem; color: var(--text-muted); max-width: 500px; margin: 0 auto; }

        /* Form Styling */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 10px; font-size: 0.85rem; color: var(--gold-accent); text-transform: uppercase; }
        input, textarea { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border); border-radius: 12px; color: #fff; }
        input:focus, textarea:focus { outline: none; border-color: var(--gold-accent); box-shadow: var(--glow); }

        .submit-btn {
            width: 100%; padding: 18px; background: var(--gold-accent); color: #000; border: none; border-radius: 12px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 15px;
        }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--gold-accent); }
        .whatsapp-btn { display: inline-block; padding: 16px 30px; background: #25D366; color: white; text-decoration: none; border-radius: 50px; font-weight: 700; margin-top: 20px; }

        @media (max-width: 768px) { .input-row { grid-template-columns: 1fr; gap: 0; } h1 { font-size: 2.2rem; } .college-name { font-size: 1.1rem; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-wrapper">
        <header>
            <div class="logo-container">
                <img src="https://i.ibb.co/xSCgY7Dw/Adobe-Express-file.png" alt="Logo" class="college-logo-transparent">
            </div>
            <span class="college-name">Excellence Tutors College</span>
            <span class="presents">presents...</span>
            <h1>BEYOND JAMB</h1>
            <p class="tagline">Bridge the gap between your scores and university admission.</p>
        </header>

        <form id="webinarForm">
            <div class="form-group"><label>Full Name</label><input type="text" required></div>
            <div class="input-row">
                <div class="form-group"><label>Email Address</label><input type="email" required></div>
                <div class="form-group"><label>WhatsApp Number</label><input type="tel" required></div>
            </div>
            <div class="input-row">
                <div class="form-group"><label>Course of Choice</label><input type="text" required></div>
                <div class="form-group"><label>School of Choice</label><input type="text" required></div>
            </div>
            <button type="submit" class="submit-btn">Secure My Seat</button>
        </form>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3 style="color: var(--gold-accent); font-size: 1.8rem;">Congratulations!</h3>
            <p style="color: white; margin: 15px 0;">Your registration is complete.</p>
            <a href="https://chat.whatsapp.com/C7Kt7Mf5Cs383C8imodLat" class="whatsapp-btn">Join WhatsApp Group</a>
        </div>
    </div>

    <script>
        document.getElementById('webinarForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('modalOverlay').classList.add('active');
        });
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
    </script>
</body>
    </html>
